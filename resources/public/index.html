<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Calculadora de Calorias Functional</title>
  </head>
  <body>
    <div id="app">Cargando aplicação...</div>
    <script src="js/compiled/trab_av3.js" type="text/javascript"></script>
    <script type="text/javascript">
      window.onload = function() {
        if (typeof frontend !== 'undefined' && frontend.main && frontend.main.init) {
          frontend.main.init();
        } else {
          console.error("Erro: frontend.main.init não encontrado.");
          document.getElementById("app").innerHTML = "Erro ao carregar aplicação.";
        }
      };
    </script>
  </body>
</html>
